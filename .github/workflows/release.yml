name: Release

# Matrix build: each MC target builds on its own runner in parallel. After all
# matrix jobs finish, a final job downloads every jar artifact into one dir and
# runs publish.ps1 to create the GitHub Release and push the Modrinth versions.
#
# All logic lives in scripts/list-modules.ps1 and scripts/publish.ps1 so the
# entire flow can run locally (build all modules, then publish.ps1 over the
# build outputs); the workflow only shells those scripts.

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write   # needed to create GitHub Releases

# Force checkout / cache / setup-java / upload-artifact actions onto Node.js 24.
# Their published v4 tags still ship Node 20 binaries, which GitHub deprecates
# starting June 2 2026. Opting in early kills the warning and avoids a forced
# migration breaking us. Remove this env once the action authors ship v5 (or
# whichever tag) on Node 24.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  enumerate:
    runs-on: windows-latest
    outputs:
      matrix: ${{ steps.list.outputs.matrix }}
      version: ${{ steps.ver.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute version from tag
        id: ver
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $version = $tag.TrimStart('v')
          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: List active MC modules
        id: list
        shell: pwsh
        run: |
          $matrix = ./scripts/list-modules.ps1
          Write-Host "matrix=$matrix"
          "matrix=$matrix" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

  build:
    needs: enumerate
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        mc: ${{ fromJson(needs.enumerate.outputs.matrix) }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # mc-1.21.x modules need Java 21. Gradle's foojay resolver downloads JDK
      # 17 for the 1.20.4-and-earlier modules on demand.
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      # --configure-on-demand skips configuring the other 17 sibling mc-* modules
      # this runner doesn't need. Cuts per-runner configure time roughly in half by
      # avoiding fabric-api / MC-mappings downloads for unrelated MC versions.
      - name: Build :mc-${{ matrix.mc }}:build
        shell: pwsh
        run: ./gradlew ":mc-${{ matrix.mc }}:build" --no-daemon --configure-on-demand

      - name: Upload jar artifact
        uses: actions/upload-artifact@v4
        with:
          name: openziti-mc-${{ matrix.mc }}
          path: |
            mc-${{ matrix.mc }}/build/libs/openziti-mc-*.mc${{ matrix.mc }}.jar
            !mc-${{ matrix.mc }}/build/libs/*-dev-shadow.jar
            !mc-${{ matrix.mc }}/build/libs/*-sources.jar
          if-no-files-found: error
          retention-days: 7

  release:
    needs: [enumerate, build]
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all jar artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List downloaded jars
        shell: pwsh
        run: Get-ChildItem -Path artifacts -Recurse -File | Select-Object FullName, Length

      - name: Publish
        shell: pwsh
        run: |
          ./scripts/publish.ps1 `
            -Version "${{ needs.enumerate.outputs.version }}" `
            -ArtifactsDir "artifacts" `
            -ModrinthToken "${{ secrets.MODRINTH_TOKEN }}" `
            -ModrinthProjectId "${{ secrets.MODRINTH_PROJECT_ID }}" `
            -GitHubToken "${{ secrets.GITHUB_TOKEN }}" `
            -GitHubRepo "${{ github.repository }}" `
            -Changelog "Release ${{ needs.enumerate.outputs.version }}. See https://github.com/${{ github.repository }}/blob/main/README.md and https://github.com/${{ github.repository }}/blob/main/SETUP.md for setup, configuration, and install steps."
