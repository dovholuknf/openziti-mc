name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write   # needed to create GitHub Releases

jobs:
  release:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # mc-1.21.x modules need Java 21. Gradle's foojay resolver downloads JDK 17
      # for the mc-1.20.1 module on demand.
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Compute version from tag
        id: ver
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"   # e.g. v0.1.0
          $version = $tag.TrimStart('v')
          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

      - name: Publish
        shell: pwsh
        run: |
          ./scripts/publish.ps1 `
            -Version "${{ steps.ver.outputs.version }}" `
            -ModrinthToken "${{ secrets.MODRINTH_TOKEN }}" `
            -ModrinthProjectId "${{ secrets.MODRINTH_PROJECT_ID }}" `
            -GitHubToken "${{ secrets.GITHUB_TOKEN }}" `
            -GitHubRepo "${{ github.repository }}" `
            -Changelog "Release ${{ steps.ver.outputs.version }}. See https://github.com/${{ github.repository }}/blob/main/README.md and https://github.com/${{ github.repository }}/blob/main/SETUP.md for setup, configuration, and install steps."
