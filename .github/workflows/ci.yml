name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Build (no publish)
        shell: pwsh
        run: ./scripts/publish.ps1 -Version (Get-Content gradle.properties | Select-String '^mod_version=(.+)$').Matches[0].Groups[1].Value.Trim()

      - name: Upload jar artifact
        uses: actions/upload-artifact@v4
        with:
          name: openziti-fabric-jar
          path: fabric/build/libs/openziti-fabric-*.jar
          if-no-files-found: error
