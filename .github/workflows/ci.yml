name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# Force checkout / cache / setup-java / upload-artifact actions onto Node.js 24.
# Their published v4 tags still ship Node 20 binaries, which GitHub deprecates
# starting June 2 2026. Opting in early kills the warning and avoids a forced
# migration breaking us. Remove this env once the action authors ship v5 (or
# whichever tag) on Node 24.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # mc-1.21.x modules need Java 21. Gradle's foojay resolver downloads JDK 17
      # for the mc-1.20.1 module on demand.
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Build (no publish)
        shell: pwsh
        run: ./scripts/publish.ps1 -Version (Get-Content gradle.properties | Select-String '^mod_version=(.+)$').Matches[0].Groups[1].Value.Trim()

      - name: Upload jar artifacts
        uses: actions/upload-artifact@v4
        with:
          name: openziti-mc-jars
          path: mc-*/build/libs/openziti-mc-*.mc*.jar
          if-no-files-found: error
